<body>
    <script>

        var jokujono = ["kakkea", "kaikki", "oomme", "kaikki", "oomme", "kaikki", "kaikki", "mitätäällätapahtuuuuu", "hei", "vittusaatana", "mikätyömaa"];

        lapikaynti(jokujono);

        console.log("Lyhin merkki jono on: ", jokujono[0], " ja pisin merkkijono on: ", jokujono[jokujono.length-1]);

        function lapikaynti(jokujono) {

            jokujono.sort((a,b) => a.length - b.length);

            return jokujono;
        }

    </script>
</body>
