<!DOCTYPE html>
<html>

<head>
  <title>Fifteen Puzzle</title>
  <link href="fifteen.css" type="text/css" rel="stylesheet" />
  <script src="http://ajax.googleapis.com/ajax/libs/prototype/1.6.1.0/prototype.js" type="text/javascript"></script>
  <script src="fifteen.js" type="text/javascript"></script>
  <style>
    body {
      background-color: white;
      font-family: cursive;
      font-size: 14pt;
    }

    #kontrollit {
      padding-top: 10px;
      text-align: center;
    }

    h1 {
      margin: 10px 0px;
      text-align: center;
    }

    /* Area where the puzzle piece are */
    #puzzlearea {
      font-family: sans-serif;
      font-size: 32pt;
      height: 400px;
      width: 400px;
      padding: 0px;
      position: relative;
      margin-left: auto;
      margin-right: auto;
    }

    /* Applied to the puzzle pieces*/
    .puzzlepiece {
      background-image: url(background.jpg);
      background-repeat: no-repeat;
      border: 2px solid black;
      cursor: default;
      height: 96px;
      line-height: 96px;
      text-align: center;
      vertical-align: middle;
      width: 96px;
    }

    .movablepiece:hover {
      border: 2px solid red;
      color: red;
    }
  </style>
</head>

<body>
  <h1>Fifteen Puzzle</h1>
  <div id="puzzlearea">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div>7</div>
    <div>8</div>
    <div>9</div>
    <div>10</div>
    <div>11</div>
    <div>12</div>
    <div>13</div>
    <div>14</div>
    <div>15</div>
  </div>

  <p id="kontrollit">
    <button id="Sekoitusnappula">Sekoita</button>
  </p>
</body>

</html>
