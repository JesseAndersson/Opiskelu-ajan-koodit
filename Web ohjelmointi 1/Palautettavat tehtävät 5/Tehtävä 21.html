<body>

    <script>
        var sade = 5;
        var tilavuus;
        pallonTilavuus(sade);

        function pallonTilavuus(sade){
            return tilavuus = (4*Math.PI*Math.pow(sade,3))/3;
        }
        console.log("Tilavuus on:", tilavuus);
    </script>
