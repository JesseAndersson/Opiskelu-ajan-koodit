<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        var kierrokset = parseInt(prompt('Montako riviä fibonaccin jonoa tulostetaan: '));

        fibonacci(kierrokset);
        function fibonacci(kierrokset) {
            
            var eka = 0, toka = 1, kolmas;

            kolmas = eka + toka;

            for (var i = 0; i <= kierrokset; i++) {

                console.log(eka,'+',toka,'=',kolmas);

                eka = toka;
                toka = kolmas;
                kolmas = eka + toka;

            }
        }
    </script>
</body>

</html>
