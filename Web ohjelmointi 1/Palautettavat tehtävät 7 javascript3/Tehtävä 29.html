    <script>
        class Oppilas {

            constructor(nimi, syntymavuosi, osoite, puhNum) {
                this.nimi = nimi;
                this.syntymavuosi = syntymavuosi;
                this.osoite = osoite;
                this.puhNum = puhNum;

            }

            Tulosta() {
                
                return console.log(this.nimi, this.syntymavuosi, this.osoite, this.puhNum);

            }

            LaskeIka() {
                let date = new Date();
                let year = date.getFullYear();
                let ika = year - this.syntymavuosi;
                console.log(ika);
            }
        }


        const oppilas = new Oppilas("Jonne", 1995, "heeboiluja", "044029309");
        const oppilas1 = new Oppilas("Topsukka", 2020, "hihulihei", "0444044022");

        oppilas.Tulosta();
        oppilas.LaskeIka();
        oppilas1.Tulosta();
        oppilas1.LaskeIka();

    </script>
