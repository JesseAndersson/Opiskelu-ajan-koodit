<!-- Ohjelma laskee iän hieman väärin vuosi menee oikein päivä ja kuukausi hieman heittää en löydä vikaa mistään #google on koluttu läpi -->
<body>
    <label for="Date" id="Label">Kirjoita syntymäaikasi: </label>
    <input type="date" id="BirthDay">
    <br>
    <button onclick="LaskeIka()">Tarkistetaanpas</button>

    <script>
        "use strict";
        function LaskeIka() {
            var Syntymapaiva = document.getElementById("BirthDay").value;
            const d = new Date(Syntymapaiva);
            var vuosi = d.getFullYear();
            var kuukausi = d.getMonth();
            var paiva = d.getDay();
            if (vuosi < 1900 || vuosi > 2022) {
                document.getElementById("Varoitus").innerHTML = "Vuoden täytyy olla väliltä 1900-2022";
            }
            if(Syntymapaiva == ""){
                document.getElementById("Varoitus").innerHTML = "Et voi laittaa tyhjää";
            }
            else if(vuosi > "1900" && vuosi < "2022")
            {
                let ThisDate = new Date();
                var year = ThisDate.getFullYear();
                var month = ThisDate.getMonth();
                var day = ThisDate.getDay();
                year = year * 12 * 30;
                month = (month + 1) * 30;
                day = year + month + day;
                vuosi = vuosi * 12 * 30;
                kuukausi = kuukausi * 30;
                paiva = vuosi + kuukausi + paiva;
                if(paiva > day)
                {

                }
                day = day - paiva;
                month = day / 30;
                year = month / 12;
                let round_number = year.toFixed(0);
                document.getElementById("Ikasi").innerHTML = "Sinun syntymäaikasi on " + Syntymapaiva;
                document.getElementById("Vastaus").innerHTML = "Ikäsi on : " + round_number + " Vuotta ";
            }
        }
    </script>
    <p id="Ikasi"></p>
    <p id="Vastaus"></p>
    <p id="Varoitus"></p>
</body>

</html>
